<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="A Deckhand slide rendered with the dark theme: a heading, a syntax-highlighted TypeScript code block, and a slide counter.">
  <!-- dark theme slide surface (#10131a) -->
  <rect width="960" height="600" fill="#10131a"/>

  <!-- progress bar: track + filled portion -->
  <rect x="0" y="0" width="960" height="4" fill="#ffffff" opacity="0.14"/>
  <rect x="0" y="0" width="384" height="4" fill="#e8eaf0"/>

  <!-- heading (white) -->
  <text x="96" y="150" fill="#ffffff" font-size="40" font-weight="700">Code blocks are highlighted</text>

  <!-- code panel (#05070c) -->
  <rect x="96" y="196" width="768" height="196" rx="6" fill="#05070c"/>
  <g font-family="'SFMono-Regular', Consolas, 'Liberation Mono', monospace" font-size="21">
    <text x="128" y="242">
      <tspan fill="#ff7edb">export function </tspan><tspan fill="#7db4ff">greet</tspan><tspan fill="#d7dbe3">(name</tspan><tspan fill="#d7dbe3">: </tspan><tspan fill="#56d4c7">string</tspan><tspan fill="#d7dbe3">)</tspan><tspan fill="#d7dbe3">: </tspan><tspan fill="#56d4c7">string</tspan><tspan fill="#d7dbe3"> {</tspan>
    </text>
    <text x="128" y="282">
      <tspan fill="#ff7edb" xml:space="preserve">  return </tspan><tspan fill="#ffd479">`Hello, ${name}!`</tspan><tspan fill="#d7dbe3">;</tspan>
    </text>
    <text x="128" y="322" fill="#d7dbe3">}</text>
  </g>

  <!-- body line with inline code -->
  <text x="96" y="452" font-size="23" fill="#e8eaf0">A <tspan font-family="'SFMono-Regular', Consolas, monospace" fill="#ffd479">---</tspan> inside a fenced code block does <tspan font-weight="700">not</tspan> split the slide.</text>

  <!-- slide counter (bottom-right, muted) -->
  <text x="864" y="566" fill="#666f80" font-size="17" text-anchor="end">3 / 6</text>
</svg>
